<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 | BookReview</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f1f5f9;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        /* 로그인 카드 박스 */
        .login-container {
            background-color: var(--white);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0 0 10px 0;
            letter-spacing: -1.5px;
            cursor: pointer;
        }

        .login-header p {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 35px;
        }

        /* 입력창 스타일 */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text-main);
            font-size: 0.85rem;
            padding-left: 4px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        /* 버튼 스타일 */
        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 링크 스타일 */
        .footer-link {
            margin-top: 30px;
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h1 onclick="location.href='index.html'">📚 BookReview</h1>
        <p>당신의 독서 기록을 다시 만나보세요.</p>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label for="email">이메일 주소</label>
            <input type="email" id="email" placeholder="example@mail.com" required>
        </div>
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="loginBtn">로그인하기</button>
    </form>

    <div class="footer-link">
        아직 회원이 아니신가요? <a href="join.html">회원가입</a>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const btn = document.getElementById('loginBtn');
        const originalText = btn.innerText;
        btn.innerText = '로그인 중...';
        btn.disabled = true;

        const data = {
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        fetch('/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        })
        .then(response => {
            if (!response.ok) {
                // 로그인 실패 시 (401 등) 에러 메시지 처리
                return response.text().then(text => { throw new Error(text) });
            }
            return response.json();
        })
        .then(user => {
            sessionStorage.setItem('user', JSON.stringify(user));
            alert(`${user.nickname}님, 환영합니다! ✨`);
            location.href = 'index.html';
        })
        .catch(err => {
            alert(err.message || '로그인에 실패했습니다. 이메일과 비밀번호를 확인해주세요.');
            btn.innerText = originalText;
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
