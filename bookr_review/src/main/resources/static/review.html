<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>리뷰 작성 | BookReview</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg: #f8fafc;
      --white: #ffffff;
      --text-main: #1e293b;
      --text-sub: #64748b;
      --star-color: #fbbf24;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background-color: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--text-main);
    }

    .review-wrapper {
      background: var(--white);
      padding: 50px 40px;
      border-radius: 32px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header-area { text-align: center; margin-bottom: 40px; }
    .header-area h2 { font-size: 1.75rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
    .header-area p { color: var(--text-sub); margin-top: 8px; font-size: 0.95rem; }

    /* 도서 정보 요약 박스 */
    .book-info-badge {
      background: #f1f5f9;
      padding: 12px 20px;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 30px;
      font-size: 0.9rem;
      color: var(--text-sub);
      font-weight: 600;
    }

    .form-group { margin-bottom: 24px; }
    label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-main); margin-bottom: 10px; }

    /* 별점 스타일 업그레이드 */
    .star-rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: center;
      gap: 12px;
    }
    .star-rating input { display: none; }
    .star-rating label {
      font-size: 40px;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .star-rating input:checked ~ label,
    .star-rating label:hover,
    .star-rating label:hover ~ label {
      color: var(--star-color);
      transform: scale(1.1);
      text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
    }

    /* 입력창 스타일 */
    input[type="text"], textarea {
      width: 100%;
      padding: 16px;
      border: 2px solid #f1f5f9;
      border-radius: 16px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: all 0.2s;
      background: #f8fafc;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    button {
      width: 100%;
      padding: 18px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 18px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }
    button:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 25px;
      text-decoration: none;
      color: var(--text-sub);
      font-size: 0.9rem;
      font-weight: 600;
      transition: 0.2s;
    }
    .back-link:hover { color: var(--text-main); }
  </style>
</head>
<body>

<div class="review-wrapper">
  <div class="header-area">
    <h2>📝 기록하기</h2>
    <p>이 책은 당신에게 어떤 문장을 남겼나요?</p>
  </div>

  <div style="text-align: center;">
    <div class="book-info-badge">
      <span>📖 Book ID : </span>
      <span id="displayBookId">-</span>
    </div>
  </div>

  <form id="reviewForm">
    <input type="hidden" id="userId">
    <input type="hidden" id="bookId">

    <div class="form-group">
      <label>솔직한 별점을 남겨주세요</label>
      <div class="star-rating">
        <input type="radio" id="5-stars" name="rating" value="5" checked>
        <label for="5-stars">★</label>
        <input type="radio" id="4-stars" name="rating" value="4">
        <label for="4-stars">★</label>
        <input type="radio" id="3-stars" name="rating" value="3">
        <label for="3-stars">★</label>
        <input type="radio" id="2-stars" name="rating" value="2">
        <label for="2-stars">★</label>
        <input type="radio" id="1-star" name="rating" value="1">
        <label for="1-star">★</label>
      </div>
    </div>

    <div class="form-group">
      <label for="title">리뷰 제목</label>
      <input type="text" id="title" placeholder="리뷰의 핵심 내용을 적어주세요" required>
    </div>

    <div class="form-group">
      <label for="content">감상평</label>
      <textarea id="content" rows="6" placeholder="자유롭게 책에 대한 생각을 나누어보세요."></textarea>
    </div>

    <button type="submit">리뷰 등록하기</button>
    <a href="index.html" class="back-link">나중에 적기</a>
  </form>
</div>

<script>
  // 데이터 초기화 및 스크립트 로직 (기존 기능 유지)
  const userData = JSON.parse(sessionStorage.getItem('user'));
  const urlParams = new URLSearchParams(window.location.search);
  const bookIdFromUrl = urlParams.get('bookId');

  if (userData) {
    document.getElementById('userId').value = userData.userId || userData.id;
  } else {
    alert("로그인이 필요합니다.");
    location.href = 'login.html';
  }

  if (bookIdFromUrl) {
    document.getElementById('bookId').value = bookIdFromUrl;
    document.getElementById('displayBookId').innerText = bookIdFromUrl;
  }

  document.getElementById('reviewForm').addEventListener('submit', function(e) {
    e.preventDefault();

    const selectedRating = document.querySelector('input[name="rating"]:checked').value;
    const data = {
      user: { userId: document.getElementById('userId').value },
      book: { bookId: document.getElementById('bookId').value },
      rating: selectedRating,
      title: document.getElementById('title').value, // 제목 추가
      content: document.getElementById('content').value
    };

    fetch('/api/reviews/write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(response => {
      if (response.ok) return response.text();
      throw new Error('등록 실패');
    })
    .then(msg => {
      alert("리뷰가 소중하게 저장되었습니다! ✨");
      location.href = 'account-settings.html';
    })
    .catch(err => alert('잠시 후 다시 시도해주세요.'));
  });
</script>

</body>
</html>
