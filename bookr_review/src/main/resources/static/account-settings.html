<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마이페이지 | BookReview</title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --danger: #ef4444;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { font-family: 'Pretendard', sans-serif; display: flex; margin: 0; background: var(--bg); color: var(--text-main); }

        /* 사이드바 */
        .sidebar {
            width: 280px; background: var(--white); height: 100vh;
            border-right: 1px solid #e2e8f0; padding: 40px 24px;
            position: sticky; top: 0;
        }
        .sidebar h1 { font-size: 1.5rem; margin-bottom: 40px; cursor: pointer; color: var(--primary); font-weight: 800; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li {
            padding: 12px 16px; cursor: pointer; border-radius: 12px;
            margin-bottom: 8px; font-weight: 600; color: var(--text-sub);
            transition: all 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .sidebar li:hover { background: #f1f5f9; color: var(--primary); }
        .sidebar li.active { background: var(--primary); color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }

        /* 컨텐츠 영역 */
        .content { flex: 1; padding: 60px; max-width: 1000px; }
        .section { display: none; animation: fadeIn 0.4s; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* 요약 통계 카드 */
        .stats-container { display: flex; gap: 20px; margin-bottom: 40px; }
        .stat-card {
            background: white; padding: 24px; border-radius: 20px; flex: 1;
            box-shadow: var(--shadow); border: 1px solid #f1f5f9;
        }
        .stat-card span { color: var(--text-sub); font-size: 0.9rem; font-weight: 600; }
        .stat-card div { font-size: 1.8rem; font-weight: 800; margin-top: 8px; color: var(--primary); }

        /* 리뷰 카드 */
        .review-card {
            position: relative; background: white; padding: 30px;
            border-radius: 24px; margin-bottom: 24px; box-shadow: var(--shadow);
            border: 1px solid #f1f5f9; transition: transform 0.3s;
        }
        .review-card:hover { transform: translateY(-5px); }
        .review-card h4 { margin: 0 0 12px; font-size: 1.25rem; font-weight: 700; color: var(--text-main); }
        .review-card .rating { margin-bottom: 15px; font-size: 1.1rem; }
        .review-card .content-text { color: var(--text-sub); line-height: 1.6; font-size: 1rem; }

        /* 드롭다운 메뉴 */
        .menu-container { position: absolute; top: 25px; right: 25px; }
        .menu-img-btn {
            width: 32px; height: 32px; cursor: pointer; padding: 6px;
            border-radius: 10px; transition: background 0.2s;
        }
        .menu-img-btn:hover { background: #f1f5f9; }

        .dropdown-menu {
            display: none; position: absolute; right: 0; top: 40px;
            background: white; border-radius: 12px; min-width: 140px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); border: 1px solid #f1f5f9;
            z-index: 100; overflow: hidden;
        }
        .dropdown-menu button {
            width: 100%; padding: 12px 16px; border: none; background: none;
            text-align: left; cursor: pointer; font-size: 0.9rem; font-weight: 600;
            color: var(--text-main); transition: background 0.2s;
        }
        .dropdown-menu button:hover { background: #f8fafc; color: var(--primary); }
        .dropdown-menu .delete-btn { color: var(--danger); }
        .show { display: block; }

        /* 설정 박스 */
        .settings-box {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: var(--shadow); border: 1px solid #f1f5f9;
        }
        .settings-box p { margin-bottom: 20px; font-size: 1.1rem; color: var(--text-sub); }
        .settings-box strong { color: var(--text-main); margin-right: 10px; }
        .btn-change-pw {
            background: var(--primary); color: white; border: none;
            padding: 12px 24px; border-radius: 12px; font-weight: 700;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-change-pw:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 onclick="location.href='index.html'">📚 BookReview</h1>
    <ul>
        <li id="menu-reviews" class="active" onclick="showSection('reviews')">📝 내가 쓴 리뷰</li>
        <li id="menu-settings" onclick="showSection('settings')">⚙️ 계정 설정</li>
    </ul>
</div>

<div class="content">
    <div id="section-reviews" class="section active">
        <h2>내 리뷰 관리</h2>
        <div class="stats-container">
            <div class="stat-card">
                <span>작성한 리뷰</span>
                <div id="review-count">0</div>
            </div>
            <div class="stat-card">
                <span>활동 등급</span>
                <div>일반 독자</div>
            </div>
        </div>
        <div id="myReviewList">리뷰를 불러오는 중...</div>
    </div>

    <div id="section-settings" class="section">
        <h2>계정 설정</h2>
        <div class="settings-box">
            <p><strong>닉네임</strong> <span id="userNickname">-</span></p>
            <p><strong>이메일</strong> <span id="userEmail">-</span></p>
            <button class="btn-change-pw" onclick="location.href='change-password.html'">비밀번호 변경하기</button>
        </div>
    </div>
</div>

<script>
    // JS 로직은 기존과 동일하게 유지하되, DOM 생성 부분의 스타일 클래스만 맞춰주면 됩니다.
    // (기존 스크립트의 loadMyReviews 함수 내부에서 생성하는 엘리먼트들에 위의 새로운 클래스를 적용)

    document.addEventListener('DOMContentLoaded', () => {
        const userData = JSON.parse(sessionStorage.getItem('user'));
        if (!userData) {
            alert("로그인이 필요합니다.");
            location.href = 'login.html';
            return;
        }
        document.getElementById('userNickname').innerText = userData.nickname || '닉네임 없음';
        document.getElementById('userEmail').innerText = userData.email || '이메일 없음';
        loadMyReviews(userData);
    });

    function showSection(name) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.sidebar li').forEach(l => l.classList.remove('active'));
        document.getElementById('section-' + name).classList.add('active');
        document.getElementById('menu-' + name).classList.add('active');
    }

    function toggleMenu(event, id) {
        event.stopPropagation();
        const menu = document.getElementById(`dropdown-${id}`);
        document.querySelectorAll('.dropdown-menu').forEach(m => { if (m !== menu) m.classList.remove('show'); });
        menu.classList.toggle('show');
    }

    window.onclick = (e) => {
        if (!e.target.matches('.menu-img-btn')) {
            document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
        }
    }

    function deleteReview(id) {
        if (confirm("정말 이 리뷰를 삭제하시겠습니까?")) {
            fetch(`/api/reviews/${id}`, { method: 'DELETE' })
                .then(res => { if (res.ok) { alert("삭제되었습니다."); location.reload(); } })
                .catch(err => console.error(err));
        }
    }

    function loadMyReviews(userData) {
        const currentId = userData.userId || userData.id;
        fetch(`/api/reviews/my/${currentId}`)
            .then(res => res.json())
            .then(reviews => {
                const listDiv = document.getElementById('myReviewList');
                listDiv.innerHTML = '';
                document.getElementById('review-count').innerText = reviews.length;

                if (!reviews || reviews.length === 0) {
                    listDiv.innerHTML = '<p style="color:var(--text-sub)">아직 작성한 리뷰가 없습니다.</p>';
                    return;
                }

                reviews.forEach(review => {
                    const rId = parseInt(review.reviewId || review.id, 10);
                    const bookTitle = review.book ? review.book.title : "알 수 없는 도서";

                    const card = document.createElement('div');
                    card.className = 'review-card';

                    const menuContainer = document.createElement('div');
                    menuContainer.className = 'menu-container';
                    menuContainer.innerHTML = `
                        <img src="https://cdn-icons-png.flaticon.com/512/2311/2311524.png" class="menu-img-btn" onclick="toggleMenu(event, ${rId})">
                        <div id="dropdown-${rId}" class="dropdown-menu">
                            <button onclick="location.href='edit-review.html?id=${rId}'">수정하기</button>
                            <button class="delete-btn" onclick="deleteReview(${rId})">삭제하기</button>
                        </div>
                    `;

                    const h4 = document.createElement('h4');
                    h4.textContent = bookTitle;

                    const rating = document.createElement('div');
                    rating.className = 'rating';
                    rating.textContent = '⭐'.repeat(review.rating);

                    const content = document.createElement('div');
                    content.className = 'content-text';
                    content.textContent = review.content;

                    card.append(menuContainer, h4, rating, content);
                    listDiv.appendChild(card);
                });
            });
    }
</script>
</body>
</html>
