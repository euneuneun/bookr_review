<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
        /* 왼쪽 사이드바 메뉴 */
        .sidebar { width: 250px; background: #fff; height: 100vh; border-right: 1px solid #ddd; padding: 20px; }
        .sidebar h2 { color: #2c3e50; }
        .sidebar ul { list-style: none; padding: 0; }
        .sidebar li { padding: 15px; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .sidebar li:hover { background: #e9ecef; }
        .sidebar li.active { background: #4A90E2; color: white; }

        /* 오른쪽 컨텐츠 영역 */
        .content { flex: 1; padding: 40px; }
        .section { display: none; } /* 기본적으로 숨김 */
        .section.active { display: block; }

        /* 리뷰 카드 스타일 */
        .review-card {
            position : relative;
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition : transform 0.2s ease;
        }

        .review-card:hover{
            transform : translateY(-3px);
        }

        /* 메뉴 버튼으로 쓸 이미지 스타일 */
.menu-img-btn {
    width: 24px;         /* 이미지 크기 조절 */
    height: 24px;
    cursor: pointer;
    object-fit: cover;   /* 이미지 비율 유지 */
    border-radius: 50%;  /* 이미지를 원형으로 (필요 없으면 삭제) */
    transition: opacity 0.2s;
}

.menu-img-btn:hover {
    opacity: 0.7;        /* 마우스 올렸을 때 살짝 투명하게 */
}

/* 드롭다운 메뉴 위치 조정 */
.menu-container {
    position: absolute;
    top: 15px;
    right: 15px;
    display: inline-block;
}

.dropdown-menu {
    display: none;
    position: absolute;
    right: 0;
    top: 30px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    z-index: 100;
    min-width: 110px;
}

.show { display: block; }

    </style>
</head>
<body>

<div class="sidebar">
    <h1 onclick="location.href='index.html'" style="cursor:pointer">📚 책리뷰 </h1>
    <h2 onclick="location.href='account-settings.html'" style="cursor:pointer">🧐 My Page</h2>
    <ul>
        <li id="menu-reviews" class="active" onclick="showSection('reviews')">📝 내가 쓴 리뷰</li>
        <li id="menu-settings" onclick="showSection('settings')">⚙️ 설정</li>
    </ul>
</div>

<div class="content">
    <div id="section-reviews" class="section active">
        <h2>내 리뷰 목록</h2>
        <div id="myReviewList">리뷰를 불러오는 중...</div>
    </div>

    <div id="section-settings" class="section">
        <h2>계정 설정</h2>
        <div class="settings-box" style="background:white; padding:20px; border-radius:10px;">
            <p><strong>닉네임:</strong> <span id="userNickname"></span></p>
            <p><strong>이메일:</strong> <span id="userEmail"></span></p>
            <button onclick="location.href='change-password.html'">비밀번호 변경</button>
        </div>
    </div>
</div>

<script>

    // 초기 실행
    //DOMContentLoaded = 브라우저가 화면을 다 그렸을 떄 실행됨
    //세션에 있던 닉네임과 이메일을 화면의 <span> 태그 안에 넣어주고, 서버에서 리뷰를 가져오는 loadMyReviews()함수를 실행
    document.addEventListener('DOMContentLoaded', () => {
            const userData = JSON.parse(sessionStorage.getItem('user'));
    //브라우저 임시 저장소(sessionStroage)에 저장된 'user'정보를 가져와 자바스크립트 객체로 변환.

    // 로그인 체크
    if (!userData) {
        alert("로그인이 필요합니다.");
        location.href = 'login.html';
        return;
    }

        // 유저 정보 표시
        document.getElementById('userNickname').innerText = userData.nickname || '닉네임 없음';
        document.getElementById('userEmail').innerText = userData.email || '이메일 없음';
        loadMyReviews(userData);
    });

    // 섹션 전환 함수
    function showSection(sectionName) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.sidebar li').forEach(l => l.classList.remove('active'));

        document.getElementById('section-' + sectionName).classList.add('active');
        document.getElementById('menu-' + sectionName).classList.add('active');
    }

    // --- 여기서부터 복사하세요 ---

// 1. 메뉴를 열고 닫는 함수 (이게 없어서 에러가 났던 거예요!)
function toggleMenu(event, id) {
    // 클릭 이벤트가 부모 요소로 퍼져서 메뉴가 바로 닫히는 걸 방지함
    event.stopPropagation();

    const menu = document.getElementById(`dropdown-${id}`);

    // 현재 클릭한 메뉴 말고 다른 열려있는 드롭다운 메뉴들은 모두 숨김
    document.querySelectorAll('.dropdown-menu').forEach(m => {
        if (m !== menu) m.classList.remove('show');
    });

    // 해당 메뉴의 보이기/숨기기 상태를 전환 (토글)
    menu.classList.toggle('show');
}

// 2. 화면의 빈 곳을 클릭하면 열려있는 모든 메뉴를 닫음
window.onclick = function(event) {
    // 클릭한 대상이 메뉴 버튼(이미지)이 아닐 때만 닫음
    if (!event.target.matches('.menu-img-btn')) {
        document.querySelectorAll('.dropdown-menu').forEach(m => {
            m.classList.remove('show');
        });
    }
}

// 3. 삭제 버튼 클릭 시 실행될 함수
function deleteReview(id) {
    if (confirm("정말 이 리뷰를 삭제하시겠습니까?")) {
        fetch(`/api/reviews/${id}`, { method: 'DELETE' })
            .then(res => {
                if (res.ok) {
                    alert("삭제되었습니다.");
                    location.reload(); // 새로고침해서 목록 갱신
                } else {
                    alert("삭제 실패!");
                }
            })
            .catch(err => console.error("삭제 중 오류:", err));
    }
}
// --- 여기까지 복사하세요 ---
    // 내 리뷰 불러오기 함수
    function loadMyReviews(userData) {
        // 1. 세션 데이터가 있는지, 그 안에 ID가 있는지 다시 확인
        if (!userData || (!userData.userId && !userData.id)) {
            console.error("유저 ID를 찾을 수 없습니다. 세션 데이터:", userData);
            document.getElementById('myReviewList').innerHTML = '<p>유저 정보를 찾을 수 없습니다. 다시 로그인해주세요.</p>';
            return;
        }

        // 2. userId가 없을 경우 id를 사용하도록 유연하게 대처
        const currentId = userData.userId || userData.id;
        console.log("요청하는 유저 ID:", currentId); // 디버깅용

        fetch(`/api/reviews/my/${currentId}`)
            .then(res => {
                if (!res.ok) throw new Error("리뷰를 불러오는데 실패했습니다. (서버 에러)");
                return res.json();
            })
            .then(reviews => {
                const listDiv = document.getElementById('myReviewList');
                listDiv.innerHTML = ''; // 로딩 중 메시지 지우기

                if (!reviews || reviews.length === 0) {
                    listDiv.innerHTML = '<p>아직 작성한 리뷰가 없습니다.</p>';
                    return;
                }

    reviews.forEach(review => {

    const rId = parseInt(review.reviewId || review.id, 10);
    const bookTitleStr = review.book ? review.book.title : "알 수 없는 도서";

    // 1. 가장 바깥쪽 카드 상자 만들기
    const card = document.createElement('div');
    card.className = 'review-card';
    card.style.position = 'relative';

    // 2. 제목(h4) 만들고 글자 넣기
    const h4 = document.createElement('h4');
    h4.textContent = bookTitleStr; // <script>가 들어와도 그냥 글자로 나옴!

    // 3. 별점(p) 만들기
    const ratingP = document.createElement('p');
    ratingP.textContent = '⭐'.repeat(review.rating);
    ratingP.style.color = '#f1c40f';

    // 4. 내용(p) 만들기
    const contentP = document.createElement('p');
    contentP.textContent = review.content;

    // 5. 메뉴 컨테이너 (이미지 버튼 + 드롭다운)
    // 이 부분은 구조가 복잡하므로 뼈대만 innerHTML로 만들되
    // 실제 데이터는 넣지 않는 식으로 혼합하거나, 전부 생성할 수 있습니다.
    const menuContainer = document.createElement('div');
    menuContainer.className = 'menu-container';
    menuContainer.innerHTML = `
        <img src="/images/menu.png" class="menu-img-btn" onclick="toggleMenu(event, ${rId})">
        <div id="dropdown-${rId}" class="dropdown-menu">
            <button onclick="location.href='edit-review.html?id=${rId}'">수정하기</button>
            <button class="delete-btn" onclick="deleteReview(${rId})" style="color:red;">삭제하기</button>
        </div>
    `;

    // 6. 카드 상자에 차곡차곡 조립하기
    card.appendChild(menuContainer);
    card.appendChild(h4);
    card.appendChild(ratingP);
    card.appendChild(contentP);

    // 7. 최종적으로 목록에 추가
    listDiv.appendChild(card);
});
            })
            .catch(err => {
                console.error("상세 에러:", err);
                document.getElementById('myReviewList').innerHTML = `<p>오류 발생: ${err.message}</p>`;
            });

    }
</script>

</body>
</html>
