<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
<div class="change-pwd-container">
    <h2>🔒 비밀번호 변경</h2>
    <form id="passwordForm">
        <div class="form-group">
            <label>현재 비밀번호</label>
            <input type="password" id="currentPassword" required>
        </div>
        <hr>
        <div class="form-group">
            <label>새 비밀번호</label>
            <input type="password" id="newPassword" required>
        </div>
        <div class="form-group">
            <label>새 비밀번호 확인</label>
            <input type="password" id="confirmPassword" required>
        </div>
        <button type="submit" class="submit-btn">비밀번호 업데이트</button>
    </form>
</div>

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .change-pwd-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; /* 패딩이 넓이를 벗어나지 않게 함 */
        }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #4A90E2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .submit-btn:hover { background-color: #357ABD; }
    </style>
</head>
<script>
    // 1. 비밀번호 폼(passwordForm)에서 제출 버튼이 눌렷을 때 실행할 함수 등록
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const newPwd = document.getElementById('newPassword').value;
        const confirmPwd = document.getElementById('confirmPassword').value;

        // 1. 새 비밀번호 일치 여부 확인
        if (newPwd !== confirmPwd) {
            alert("새 비밀번호가 일치하지 않습니다.");
            return;
        }

        const userData = JSON.parse(sessionStorage.getItem('user'));
        const userId = userData.userId || userData.id;

        const data = {
            currentPassword: document.getElementById('currentPassword').value,
            newPassword: newPwd
        };

        // 2. 서버에 변경 요청
        fetch(`/api/users/${userId}/password`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
            .then(async res => {
                const msg = await res.text();
                if (res.ok) {
                    alert(msg);
                    location.href = 'account-settings.html';
                } else {
                    alert(msg);
                }
            })
            .catch(err => alert("오류가 발생했습니다."));
    });
</script>
