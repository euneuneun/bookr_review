<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 | BookReview</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --white: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-main);
        }

        .change-pwd-container {
            background: var(--white);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header { text-align: center; margin-bottom: 35px; }
        .header .icon {
            font-size: 2.5rem; margin-bottom: 10px; display: block;
            filter: drop-shadow(0 4px 6px rgba(99, 102, 241, 0.2));
        }
        .header h2 { font-size: 1.5rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header p { color: var(--text-sub); font-size: 0.9rem; margin-top: 8px; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; margin-bottom: 8px; font-weight: 700;
            color: var(--text-main); font-size: 0.85rem; padding-left: 4px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #f1f5f9;
            border-radius: 14px;
            box-sizing: border-box;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .divider {
            border: 0; height: 1px; background: #f1f5f9; margin: 30px 0;
            position: relative; overflow: visible;
        }
        .divider::after {
            content: "새로운 비밀번호 설정";
            position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: white; padding: 0 10px;
            font-size: 0.75rem; color: #cbd5e1; font-weight: 600;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .back-link {
            display: block; text-align: center; margin-top: 25px;
            text-decoration: none; color: var(--text-sub);
            font-size: 0.85rem; font-weight: 600;
        }
        .back-link:hover { color: var(--text-main); }
    </style>
</head>
<body>

<div class="change-pwd-container">
    <div class="header">
        <span class="icon">🔒</span>
        <h2>비밀번호 변경</h2>
        <p>안전한 계정 관리를 위해 비밀번호를 수정합니다.</p>
    </div>

    <form id="passwordForm">
        <div class="form-group">
            <label>현재 비밀번호</label>
            <input type="password" id="currentPassword" placeholder="기존 비밀번호 입력" required>
        </div>

        <div class="divider"></div>

        <div class="form-group">
            <label>새 비밀번호</label>
            <input type="password" id="newPassword" placeholder="새로운 비밀번호 (8자 이상)" required>
        </div>

        <div class="form-group">
            <label>새 비밀번호 확인</label>
            <input type="password" id="confirmPassword" placeholder="한 번 더 입력해주세요" required>
        </div>

        <button type="submit" class="submit-btn">비밀번호 업데이트</button>
        <a href="account-settings.html" class="back-link">변경 취소하고 돌아가기</a>
    </form>
</div>

<script>
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const newPwd = document.getElementById('newPassword').value;
        const confirmPwd = document.getElementById('confirmPassword').value;

        if (newPwd !== confirmPwd) {
            alert("⚠️ 새 비밀번호가 서로 일치하지 않습니다. 다시 확인해주세요.");
            return;
        }

        const userData = JSON.parse(sessionStorage.getItem('user'));
        const userId = userData.userId || userData.id;

        const data = {
            currentPassword: document.getElementById('currentPassword').value,
            newPassword: newPwd
        };

        fetch(`/api/users/${userId}/password`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(async res => {
            const msg = await res.text();
            if (res.ok) {
                alert("비밀번호가 안전하게 변경되었습니다. ✨");
                location.href = 'account-settings.html';
            } else {
                alert("❌ " + msg);
            }
        })
        .catch(err => alert("서버 통신 중 오류가 발생했습니다."));
    });
</script>

</body>
</html>
